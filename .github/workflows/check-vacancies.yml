name: Dagelijkse vacaturecontrole

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Controleer vacatures
        run: python scripts/check_vacancies.py
      - name: Commit wijzigingen
        run: |
          git config user.name "vacature-check"
          git config user.email "actions@github.com"
          git add jobs.html scripts/vacancy_state.json
          git diff --cached --quiet || { git commit -m "Automatische vacaturecontrole: status bijgewerkt"; git push; }
